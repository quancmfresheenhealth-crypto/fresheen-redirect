<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đang mở Messenger...</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      min-height: 100vh; margin: 0;
      background: #f0f2f5; color: #333;
    }
    .card {
      background: white; border-radius: 16px;
      padding: 32px 24px; text-align: center;
      box-shadow: 0 2px 16px rgba(0,0,0,0.1);
      max-width: 320px; width: 90%;
    }
    .avatar { font-size: 56px; margin-bottom: 12px; }
    h2 { margin: 0 0 8px; font-size: 20px; }
    p { margin: 0 0 20px; color: #666; font-size: 14px; }
    .btn {
      display: inline-block; background: #0084ff;
      color: white; text-decoration: none;
      padding: 12px 28px; border-radius: 24px;
      font-weight: 600; font-size: 15px;
    }
    .spinner {
      width: 36px; height: 36px; border: 3px solid #e0e0e0;
      border-top-color: #0084ff; border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <div class="avatar">🌙</div>
    <h2>Bạch Nguyệt Quang</h2>
    <div class="spinner"></div>
    <p>Đang mở Messenger...<br>Nếu không tự mở, bấm nút bên dưới.</p>
    <a class="btn" href="https://m.me/61563176327448" id="fallback-btn">Mở Messenger</a>
  </div>

  <script>
    var PAGE_ID = "61563176327448";
    var ua = navigator.userAgent || "";

    function tryOpen() {
      var isIOS = /iPhone|iPad|iPod/i.test(ua);
      var isAndroid = /Android/i.test(ua);

      if (isIOS) {
        window.location.href = "fb-messenger://user-thread/" + PAGE_ID;
        setTimeout(function() {
          window.location.href = "https://m.me/" + PAGE_ID;
        }, 1500);
      } else if (isAndroid) {
        window.location.href = "intent://user/" + PAGE_ID + "#Intent;scheme=fb-messenger;package=com.facebook.orca;S.browser_fallback_url=https%3A%2F%2Fm.me%2F" + PAGE_ID + ";end";
        setTimeout(function() {
          window.location.href = "https://m.me/" + PAGE_ID;
        }, 1500);
      } else {
        window.location.href = "https://m.me/" + PAGE_ID;
      }
    }

    window.addEventListener("load", function() {
      setTimeout(tryOpen, 300);
    });
  </script>
</body>
</html>
