<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đang mở Messenger...</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      min-height: 100vh; margin: 0;
      background: #f0f2f5; color: #333;
    }
    .card {
      background: white; border-radius: 16px;
      padding: 32px 24px; text-align: center;
      box-shadow: 0 2px 16px rgba(0,0,0,0.1);
      max-width: 320px; width: 90%;
    }
    .avatar { font-size: 56px; margin-bottom: 12px; }
    h2 { margin: 0 0 8px; font-size: 20px; }
    p { margin: 0 0 20px; color: #666; font-size: 14px; }
    .btn {
      display: inline-block; background: #0084ff;
      color: white; text-decoration: none;
      padding: 12px 28px; border-radius: 24px;
      font-weight: 600; font-size: 15px;
    }
    .spinner {
      width: 36px; height: 36px; border: 3px solid #e0e0e0;
      border-top-color: #0084ff; border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <div class="avatar">👔</div>
    <h2>Tổng Tài</h2>
    <div class="spinner"></div>
    <p>Đang mở Messenger...<br>Nếu không tự mở, bấm nút bên dưới.</p>
    <a class="btn" href="https://m.me/tongtai.fresheen" id="fallback-btn">Mở Messenger</a>
  </div>

  <script>
    var PAGE_ID = "tongtai.fresheen"; // Thay tương ứng cho các file khác
    var ua = navigator.userAgent || "";

    function tryOpen() {
      var isIOS = /iPhone|iPad|iPod/i.test(ua);
      var isAndroid = /Android/i.test(ua);

      if (isIOS) {
        window.location.href = "fb-messenger://user-thread/" + PAGE_ID;
      } else if (isAndroid) {
        // Dùng Intent thay vì m.me trực tiếp để "ép" mở app Messenger trên Android
        window.location.href = "intent://user/" + PAGE_ID + "#Intent;scheme=fb-messenger;package=com.facebook.orca;end";
      } else {
        window.location.href = "https://m.me/" + PAGE_ID;
      }
      
      // Sau 2 giây nếu không mở được app thì mới chuyển hướng sang web m.me
      setTimeout(function() {
          window.location.href = "https://m.me/" + PAGE_ID;
      }, 2000);
    }

    // THAY ĐỔI: Chờ người dùng click vào nút thay vì chạy tự động
    document.getElementById("fallback-btn").addEventListener("click", function(e) {
      e.preventDefault();
      tryOpen();
    });

    // Vẫn giữ tự động nhưng tăng thời gian chờ để tránh bị Zalo chặn ngay lập tức
    window.addEventListener("load", function() {
      setTimeout(tryOpen, 1000);
    });
</script>
</body>
</html>
